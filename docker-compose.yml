services:
  mongo:
    image: mongo:6.0
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  seed:
    build:
      context: ./backend
    command: npm run seed
    environment:
      MONGO_URI: mongodb://mongo:27017/hotel-room-booking-system
    volumes:
      - backend_uploads:/app/public/uploads
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
    ports:
      - "3035:3035"
    environment:
      APP_NODE_ENV: development
      APP_PORT: 3035
      APP_BASE_URL: http://localhost:3035
      APP_SERVICE_URL: http://localhost:3034
      MONGO_URI: mongodb://mongo:27017/hotel-room-booking-system
      JWT_SECRET_KEY: local-access-secret-change-me
      JWT_REFRESH_TOKEN_SECRET_KEY: local-refresh-secret-change-me
      JWT_ACCESS_TOKEN_EXPIRES: 7d
      JWT_REFRESH_TOKEN_EXPIRES: 30d
      JWT_TOKEN_COOKIE_EXPIRES: 7
      APP_LOG_LEVEL: info
      SEND_GRID_API_KEY: ""
      SEND_SENDER_MAIL: ""
    volumes:
      - backend_uploads:/app/public/uploads
    depends_on:
      seed:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        API_BASE_URL: http://localhost:3035
        API_INTERNAL_BASE_URL: http://backend:3035
    ports:
      - "3034:3034"
    environment:
      API_BASE_URL: http://localhost:3035
      API_INTERNAL_BASE_URL: http://backend:3035
    depends_on:
      - backend

  admin-panel:
    build:
      context: ./admin-panel
      args:
        REACT_APP_API_BASE_URL: http://localhost:3035
    ports:
      - "3033:3033"
    environment:
      REACT_APP_API_BASE_URL: http://localhost:3035
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_uploads:
